name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts


    - name: Create app directory on EC2
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} "mkdir -p /home/ubuntu/admin-app"

    - name: Copy source code to EC2
      run: |
        rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='.next' \
          --exclude='dist' \
          ./ \
          ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/admin-app/

    - name: Create .env file on EC2
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
        cat <<EOT > /home/ubuntu/admin-app/.env
        PORT=3001
        NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
        EOT
        EOF


    - name: Build and Deploy with Docker on EC2
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          cd /home/ubuntu/admin-app

          # Build new Docker image (keep old image for cache)
          docker build -t admin-app:new .

          # Stop and remove existing container
          docker stop admin-app 2>/dev/null || true
          docker rm admin-app 2>/dev/null || true

          # Remove old image after build
          docker rmi admin-app:latest 2>/dev/null || true

          # Tag new image as latest
          docker tag admin-app:new admin-app:latest
          docker rmi admin-app:new 2>/dev/null || true

          # Run the container
          docker run -d \
            --name admin-app \
            --restart unless-stopped \
            -p 3005:3005 \
            --env-file .env \
            admin-app:latest

          # Prune unused images to save disk space
          docker image prune -f
        EOF
        