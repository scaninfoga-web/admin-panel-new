name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Create app directory on EC2
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} "mkdir -p /home/ubuntu/admin-app"

    - name: Copy source code to EC2
      run: |
        rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='.next' \
          --exclude='dist' \
          ./ \
          ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/admin-app/

    - name: Create .env file on EC2
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} "echo '${{ secrets.DEV_ENV_FILE }}' > /home/ubuntu/admin-app/.env"

    - name: Build and Run Docker container on EC2
      run: |
        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          cd /home/ubuntu/admin-app

          # Stop and remove existing container if running
          docker stop admin-app || true
          docker rm admin-app || true

          # Remove old images to save space
          docker image prune -f || true

          # Build the Docker image
          docker build -t admin-app .

          # Run the container with security options
          docker run -d \
            --name admin-app \
            --restart unless-stopped \
            -p 3001:3001 \
            --env-file .env \
            --security-opt no-new-privileges:true \
            --cap-drop ALL \
            --memory=1024m \
            --cpus=1 \
            admin-app
        EOF
