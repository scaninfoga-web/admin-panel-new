name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prod
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy source & Deploy
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ".,!.git,!node_modules,!.next,!dist"
          target: /home/ubuntu/admin-app
          strip_components: 0
          overwrite: true

      - name: Build and Run
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          script: |
            cd /home/ubuntu/admin-app

            # Create .env
            cat <<EOT > .env
            PORT=3001
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
            EOT

            # Enable BuildKit for faster builds with caching
            export DOCKER_BUILDKIT=1

            # Build new image (keep old image for cache layers - don't delete before build!)
            docker build --build-arg BUILDKIT_INLINE_CACHE=1 -t admin-app:new .

            # Stop and remove old container
            docker stop admin-app 2>/dev/null || true
            docker rm admin-app 2>/dev/null || true

            # Swap images
            docker rmi admin-app:old 2>/dev/null || true
            docker tag admin-app:latest admin-app:old 2>/dev/null || true
            docker tag admin-app:new admin-app:latest
            docker rmi admin-app:new 2>/dev/null || true

            # Run new container
            docker run -d \
              --name admin-app \
              --restart unless-stopped \
              -p 3005:3005 \
              --env-file .env \
              admin-app:latest

            # Cleanup
            docker image prune -f
        