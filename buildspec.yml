version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - rm -rf node_modules package-lock.json
      - npm ci

  build:
    commands:
      - echo "Building Next.js app..."
      - npm run build

  post_build:
    commands:
      - echo "Preparing deployment artifacts..."
      - mkdir -p build_artifacts
      - cp -r .next node_modules public package.json ecosystem.config.js appspec.yml scripts nginx build_artifacts/

artifacts:
  files:
    - '**/*'
  base-directory: build_artifacts