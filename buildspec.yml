version: 0.2

phases:
  pre_build:
    commands:
      - echo Installing dependencies...
      - npm install
      
  build:
    commands:
      - echo Build started on `date`
      - echo Building Next.js application...
      - npm run build
      - echo Build completed on `date`
      
  post_build:
    commands:
      - echo Post-build phase...
      - echo Creating deployment package...
      - echo Removing dev dependencies...
      - rm -rf node_modules
      - npm ci --omit=dev

artifacts:
  files:
    - '**/*'
  excludes:
    - 'node_modules/.cache/**/*'
    - '.git/**/*'
    - '.github/**/*'
  name: admin-build-$(date +%Y-%m-%d-%H-%M-%S)
  
cache:
  paths:
    - 'node_modules/**/*'
    - '.next/cache/**/*'
