version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - npm ci

  build:
    commands:
      - echo "Building Next.js app..."
      - npm run build

  post_build:
    commands:
      - echo "Preparing deployment artifacts..."
      - mkdir -p build_artifacts
      - echo "Copying required files..."
      - cp -r .next node_modules package.json package-lock.json appspec.yml scripts nginx build_artifacts/
      - cp -r app lib components redux styles build_artifacts/
      - cp ecosystem.config.cjs next.config.cjs middleware.ts build_artifacts/

artifacts:
  files:
    - '**/*'
  base-directory: build_artifacts