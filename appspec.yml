version: 0.0
os: linux

files:
  - source: /
    destination: /var/www/admin
    overwrite: true

permissions:
  - object: /var/www/admin
    owner: ubuntu
    group: ubuntu
    mode: 755
    type:
      - directory
      - file

hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 300
      runas: ubuntu
      
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root
      
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: ubuntu
    - location: scripts/configure_nginx.sh
      timeout: 300
      runas: root
      
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 300
      runas: ubuntu
      
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 300
      runas: ubuntu
